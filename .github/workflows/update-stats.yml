name: Update Luminaire Stats

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6am UTC
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub and PyPI stats
        run: |
          # GitHub stars & forks
          GH=$(curl -s -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/repos/zillow/luminaire)
          STARS=$(echo "$GH" | python3 -c "import sys,json; print(json.load(sys.stdin)['stargazers_count'])")
          FORKS=$(echo  "$GH" | python3 -c "import sys,json; print(json.load(sys.stdin)['forks_count'])")

          # PyPI downloads (last 3 months, including CI) via pepy.tech badge SVG
          BADGE=$(curl -sL "https://static.pepy.tech/badge/luminaire")
          DOWNLOADS=$(echo "$BADGE" | python3 -c "
import sys, re
svg = sys.stdin.read()
# The last numeric text node in the badge SVG is the download count (e.g. '91k', '1.2m')
nums = re.findall(r'>([0-9]+\.?[0-9]*\s*[kmb]?)</text>', svg, re.IGNORECASE)
raw = nums[-1].strip() if nums else '0'
raw = raw.lower().replace(',', '')
if raw.endswith('m'):
    val = int(float(raw[:-1]) * 1_000_000)
elif raw.endswith('k'):
    val = int(float(raw[:-1]) * 1_000)
elif raw.endswith('b'):
    val = int(float(raw[:-1]) * 1_000_000_000)
else:
    val = int(raw) if raw.isdigit() else 0
print(val)
")

          mkdir -p data
          cat > data/luminaire-stats.json <<EOF
          {
            "stars": $STARS,
            "forks": $FORKS,
            "downloads": $DOWNLOADS,
            "updated": "$(date -u +%Y-%m-%d)"
          }
          EOF

      - name: Commit updated stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/luminaire-stats.json
          git diff --staged --quiet || git commit -m "chore: update Luminaire stats [skip ci]"
          git push
